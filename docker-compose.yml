version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/nexopro
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@nexopro.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin1234!}
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - mongo
    volumes:
      - .:/app
    command: uvicorn core.backend.main:app --host 0.0.0.0 --port 8000 --reload

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
